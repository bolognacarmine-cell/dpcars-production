<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DP CARS - Admin Panel</title>
  <!-- FontAwesome Icone -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --f1-black: #0a0a0a;
      --carbon-dark: #1a1a1a;
      --ferrari-red: #DC2626;
      --dp-gold: #F1C859;
      --speed-blur: 0 0 30px rgba(220,38,38,.6);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', Arial, sans-serif;
      background: var(--f1-black);
      background-image:
        radial-gradient(circle at 20% 80%, rgba(220,38,38,.12) 0%, transparent 50%),
        linear-gradient(135deg, var(--carbon-dark) 0%, var(--f1-black) 100%);
      color: #d51717;
      line-height: 1.6;
      max-width: 1200px;
      margin: auto;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Login Overlay */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--f1-black);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .login-card {
      background: var(--carbon-dark);
      padding: 3rem;
      border-radius: 24px;
      border: 2px solid var(--ferrari-red);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--speed-blur);
    }

    .login-card h2 {
      margin-top: 0;
      margin-bottom: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(220,38,38,.02) 3px,
        rgba(220,38,38,.02) 6px
      );
      pointer-events: none;
      z-index: 1;
    }

    .f1-header {
      background: linear-gradient(180deg, rgb(10 10 10 / 80%) 0%, rgba(26, 26, 26, .95) 100%);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid rgb(220 38 38 / 41%);
      box-shadow: var(--speed-blur);
      margin-bottom: 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dp-logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem auto;
      border-radius: 24px;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,.25);
      box-shadow: 0 0 50px rgba(220,38,38,.8), inset 0 0 40px rgba(0,0,0,.6);
      animation: f1LogoPulse 2.8s cubic-bezier(.25,.46,.45,.94) infinite;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dp-logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      margin: auto;
      transition: all .5s ease;
    }

    .dp-logo-container:hover .dp-logo-img {
      filter: brightness(1.6) contrast(1.5)
              drop-shadow(0 0 60px rgba(241,200,89,1.2))
              drop-shadow(0 0 80px rgba(220,38,38,1.2));
      transform: scale(1.15);
    }

    .logo-badge {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--ferrari-red), #B91C1C);
      color: #fff;
      padding: 6px 16px;
      border-radius: 25px;
      font-family: 'Orbitron', monospace;
      font-size: .75rem;
      font-weight: 900;
      letter-spacing: .25em;
      text-transform: uppercase;
      box-shadow: 0 6px 20px rgba(220,38,38,.7);
    }

    @keyframes f1LogoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(220,38,38,.7), inset 0 0 30px rgba(0,0,0,.5); }
      50% { box-shadow: 0 0 80px rgba(220,38,38,1), 0 0 120px rgba(241,200,89,.6), inset 0 0 50px rgba(255,255,255,.15); }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--ferrari-red) 50%, var(--dp-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 25px rgba(220,38,38,.9));
      text-align: center;
    }

    form {
      background: rgba(26,26,26,.85);
      border-radius: 24px;
      padding: 3rem;
      border: 1px solid rgba(220,38,38,.4);
      backdrop-filter: blur(20px);
      margin-bottom: 3rem;
      box-shadow: 0 30px 80px rgba(0,0,0,.9);
    }

    label {
      display: block;
      margin-bottom: 1.5rem;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      font-size: .95rem;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    input, select, textarea {
      display: block;
      width: 100%;
      margin-top: .5rem;
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      transition: all .4s cubic-bezier(.25,.46,.45,.94);
      backdrop-filter: blur(15px);
      box-shadow: inset 0 2px 10px rgba(0,0,0,.3);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--ferrari-red);
      background: rgba(255,255,255,0.15);
      box-shadow: var(--speed-blur), 0 0 0 4px rgba(220,38,38,0.25), inset 0 2px 15px rgba(220,38,38,0.1);
      transform: translateY(-2px);
    }

    /* Disabilita frecce e scroll accidentale su input numero */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    input::placeholder, textarea::placeholder { color: rgba(255,255,255,.5); }
    textarea { resize: vertical; min-height: 120px; }

    button[type="submit"] {
      width: 100%;
      padding: 1.5rem;
      border-radius: 50px;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: .3em;
      background: linear-gradient(177deg, var(--ferrari-red), var(--dp-gold));
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 2rem;
      box-shadow: 0 20px 50px rgb(220 38 38);
      transition: all .5s cubic-bezier(.25,.46,.45,.94);
    }

    button[type="submit"]:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 35px 80px rgba(220,38,38,.9);
    }

    h2 {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--ferrari-red) 50%, var(--dp-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 3rem 0 2rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      filter: drop-shadow(0 0 20px rgba(220,38,38,.8));
      text-align: center;
    }

    .veicolo {
      background: rgba(26,26,26,.6);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(15px);
      transition: all .4s ease;
      position: relative;
      overflow: hidden;
    }

    .veicolo::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, transparent, var(--ferrari-red), var(--dp-gold), transparent);
    }

    .veicolo:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 70px rgba(220,38,38,.4);
      border-color: rgba(220,38,38,.5);
    }

    .veicolo strong {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      color: var(--dp-gold);
      display: block;
      margin-bottom: .5rem;
      letter-spacing: .05em;
    }

    button.delete-btn, button.edit-btn {
      color: #fff;
      border: none;
      padding: .8rem 1.5rem;
      border-radius: 25px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      transition: all .3s ease;
      margin-right: .5rem;
      margin-top: 1rem;
    }

    button.edit-btn {
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      box-shadow: 0 8px 25px rgba(59,130,246,.4);
    }

    button.edit-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(59,130,246,.7);
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
    }

    button.delete-btn {
      background: linear-gradient(135deg, #EF4444, #DC2626);
      box-shadow: 0 8px 25px rgba(239,68,68,.4);
    }

    button.delete-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(239,68,68,.7);
      background: linear-gradient(135deg, #DC2626, #B91C1C);
    }

    @media (max-width: 768px) {
      body { padding: 0.8rem; overflow-x: hidden; }
      .f1-header { padding: 1.2rem; margin-bottom: 1.5rem; border-radius: 12px; }
      .dp-logo-container { width: 80px; height: 80px; margin-bottom: 1rem; border-width: 3px; }
      h1 { font-size: 1.6rem; letter-spacing: 0.1em; }
      h2 { font-size: 1.5rem; margin-top: 2rem; }
      
      form { 
        padding: 1.5rem 1rem; 
        border-radius: 16px;
        margin-bottom: 2rem;
      }
      
      label { font-size: 0.85rem; margin-bottom: 1.2rem; }
      input, select, textarea { 
        padding: 0.8rem 1rem; 
        font-size: 0.95rem; 
        border-radius: 12px;
      }
      
      button[type="submit"] {
        padding: 1.2rem;
        font-size: 1rem;
        letter-spacing: 0.15em;
        margin-top: 1rem;
      }
      
      .veicolo {
        padding: 1.2rem;
        border-radius: 16px;
        margin-bottom: 1.2rem;
      }
      .veicolo strong { font-size: 1.2rem; }

      button.delete-btn, button.edit-btn {
        width: 100%;
        display: block;
        margin-right: 0;
        margin-bottom: 0.8rem;
        padding: 1rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.3rem; }
      .dp-logo-container { width: 70px; height: 70px; }
    }

    /* TABS */
    .admin-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(220,38,38,0.3);
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tab-btn.active {
      background: var(--ferrari-red);
      box-shadow: var(--speed-blur);
      border-color: var(--ferrari-red);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* PERMUTE STYLE */
    .permuta-card {
      background: rgba(30, 30, 30, 0.8);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .permuta-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 1rem;
    }

    .permuta-badge {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-nuova { background: #3B82F6; color: #fff; }
    .badge-in_gestione { background: #F59E0B; color: #fff; }
    .badge-completata { background: #10B981; color: #fff; }
    .badge-rifiutata { background: #EF4444; color: #fff; }

    .permuta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }

    .info-group h4 {
      color: var(--dp-gold);
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    .info-item {
      margin-bottom: 0.3rem;
      color: rgba(255,255,255,0.8);
    }

    .permuta-images {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 1rem 0;
    }

    .permuta-img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .permuta-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-select {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 5px 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="dp-logo-container">
      <img src="/admin/logo.jpg" alt="DP CARS" class="dp-logo-img">
    </div>
    <h2>ADMIN LOGIN</h2>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Username" required>
      <input type="password" id="login-pass" placeholder="Password" required>
      <button type="submit">ENTRA NEL PADDOCK</button>
    </form>
    <div id="login-error" style="color: var(--ferrari-red); margin-top: 1rem; display: none; font-weight: bold;"></div>
  </div>
</div>

<header class="f1-header">
  <div class="dp-logo-container">
    <img src="/admin/logo.jpg" alt="DP CARS" class="dp-logo-img">
    <div class="logo-badge">ADMIN</div>
  </div>
  <h1>DP CARS ADMIN PANEL</h1>
</header>

<div class="admin-tabs">
  <button class="tab-btn active" data-tab="garage">🏎️ Garage F1</button>
  <button class="tab-btn" data-tab="permute">📋 Richieste Permuta</button>
</div>

<div id="garage-tab" class="tab-content active">
  <form id="form-veicolo" enctype="multipart/form-data">
  <label>Tipo Veicolo
    <select name="tipo" required>
      <option value="auto">Auto</option>
      <option value="moto">Moto</option>
    </select>
  </label>
  <label>Marca <input name="marca" required></label>
  <label>Modello <input name="modello" required></label>
  <label>Versione <input name="versione"></label>
  <label>Mese Immatricolazione <input name="meseImmatricolazione" type="number"></label>
  <label>Anno Immatricolazione <input name="annoImmatricolazione" type="number"></label>
  <label>Potenza <input name="potenza" placeholder="es. 110 CV o 81 kW"></label>
  <label>Usato
    <select name="usato">
      <option value="false">No</option>
      <option value="true">Sì</option>
    </select>
  </label>
  <label>Stato Vendita
    <select name="statoVendita" id="select-stato-vendita">
      <option value="disponibile">Disponibile</option>
      <option value="trattativa">In Trattativa</option>
      <option value="venduto">Venduto</option>
    </select>
  </label>
  <label id="label-mostra-venduto" style="display:none;">Mostra nel sito se venduto?
    <select name="mostraVenduto">
      <option value="true">Sì</option>
      <option value="false">No</option>
    </select>
  </label>
  <label>Chilometri <input name="chilometri" type="number"></label>
  <label>Carburante
    <select name="carburante">
      <option value="">Seleziona...</option>
      <option value="benzina">Benzina</option>
      <option value="diesel">Diesel</option>
      <option value="gpl">GPL</option>
      <option value="metano">Metano</option>
      <option value="elettrico">Elettrico</option>
      <option value="ibrido benzina">Ibrido Benzina</option>
      <option value="ibrido diesel">Ibrido Diesel</option>
      <option value="plug-in benzina">Plug-in Benzina</option>
      <option value="plug-in diesel">Plug-in Diesel</option>
      <option value="benzina/gpl">Benzina/GPL</option>
      <option value="benzina/metano">Benzina/Metano</option>
      <option value="mild hybrid benzina">Mild Hybrid Benzina</option>
      <option value="ibrida elettrica / diesel">Ibrida Elettrica / Diesel</option>
      <option value="idrogeno">Idrogeno</option>
    </select>
  </label>
  <label>Cambio
    <select name="cambio">
      <option value="manuale">Manuale</option>
      <option value="automatico">Automatico</option>
      <option value="semiautomatico">Semiautomatico</option>
    </select>
  </label>
  <label>Marce <input name="marce" placeholder="es. 5, 6, 7"></label>
  <label>Trasmissione <input name="trasmissione" placeholder="es. Anteriore, Integrale"></label>
  <label>Colore <input name="colore"></label>
  <label>Porte <input name="porte" type="number"></label>
  <label>Prezzo <input name="prezzo" type="number" step="0.01" required></label>
  <label>Tipo Auto
    <select name="tipoAuto">
      <option value="city car">City Car</option>
      <option value="crossover">Crossover</option>
      <option value="suv">SUV</option>
      <option value="utilitaria">Utilitaria</option>
      <option value="berlina">Berlina</option>
      <option value="station wagon">Station Wagon</option>
      <option value="coupè">Coupè</option>
      <option value="van">Van</option>
      <option value="monovolume">Monovolume</option>
      <option value="cabriolet">Cabriolet</option>
    </select>
  </label>
  <label>Descrizione
    <textarea name="descrizioni" placeholder="Descrizione completa del veicolo..."></textarea>
  </label>
  <label>Immagini
    <input name="immagini" type="file" multiple>
  </label>
  <button type="submit" id="submit-btn-veicolo">🏎️ INSERISCI VEICOLO F1</button>
  </form>

  <div class="text-center mb-4">
    <button class="logout-btn delete-btn" style="width: auto; padding: 0.8rem 2rem;">🚪 LOGOUT</button>
  </div>

  <h2>🏁 Veicoli nel Paddock</h2>
  <div id="lista-veicoli"></div>
</div>

<div id="permute-tab" class="tab-content">
  <div class="text-center mb-4">
    <button class="logout-btn delete-btn" style="width: auto; padding: 0.8rem 2rem;">🚪 LOGOUT</button>
  </div>

  <h2>📋 Richieste di Permuta</h2>
  <div id="lista-permute">
    <p style="text-align:center; padding:2rem; opacity:0.5;">Caricamento richieste...</p>
  </div>
</div>

<script nonce="NONCE_PLACEHOLDER">
const API_BASE = window.location.hostname === "localhost" ? "http://localhost:3000" : "";

// Mostra/Nascondi opzione "Mostra nel sito se venduto"
document.getElementById('select-stato-vendita').addEventListener('change', function() {
  const labelMostra = document.getElementById('label-mostra-venduto');
  if (this.value === 'venduto') {
    labelMostra.style.display = 'block';
  } else {
    labelMostra.style.display = 'none';
  }
});

// ==============================
// AUTH & SESSION
// ==============================
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const errorEl = document.getElementById('login-error');

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('login-overlay').style.display = 'none';
      caricaVeicoli();
    } else {
      errorEl.textContent = data.error || 'Credenziali errate';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = 'Errore di connessione';
    errorEl.style.display = 'block';
  }
});

async function checkSession() {
  try {
    const res = await fetch(`${API_BASE}/api/auth/check`);
    if (res.ok) {
      document.getElementById('login-overlay').style.display = 'none';
      caricaVeicoli();
    }
  } catch (err) { console.error("Session check failed"); }
}

async function logout() {
  try {
    await fetch(`${API_BASE}/api/auth/logout`, { method: 'POST' });
    window.location.reload();
  } catch (err) { console.error("Logout failed"); }
}

document.querySelectorAll('.logout-btn').forEach(btn => {
  btn.addEventListener('click', logout);
});

// ==============================
// TABS
// ==============================
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId + '-tab').classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  if (tabId === 'permute') caricaPermute();
  else caricaVeicoli();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ==============================
// VEICOLI (GARAGE)
// ==============================
async function caricaVeicoli() {
  try {
    const res = await fetch(`${API_BASE}/veicoli/admin/all`);
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const container = document.getElementById('lista-veicoli');
    container.innerHTML = '';
    const veicoli = await res.json();
    veicoli.sort((a, b) => (a.marca + ' ' + a.modello).localeCompare(b.marca + ' ' + b.modello));
    
    veicoli.forEach(v => {
      const statoColor = v.statoVendita === 'venduto' ? '#EF4444' : v.statoVendita === 'trattativa' ? '#F59E0B' : '#10B981';
      const visibilitaInfo = v.statoVendita === 'venduto' 
        ? `<span style="font-size:0.8rem; opacity:0.8;">(${v.mostraVenduto ? '👁️ Visibile' : '🚫 Nascosto nel sito'})</span>` 
        : '';
      
      const div = document.createElement('div');
      div.className = 'veicolo';
      div.innerHTML = `
        <strong>${v.marca} ${v.modello}</strong>
        <span style="color:${statoColor};font-weight:700">(${v.statoVendita || 'Disponibile'})</span>
        ${visibilitaInfo}<br>
        💰 €${parseFloat(v.prezzo || 0).toLocaleString()}<br>
        <button class="edit-btn-action edit-btn" data-id="${v._id}">✏️ MODIFICA</button>
        <button class="delete-btn-action delete-btn" data-id="${v._id}">🗑️ ELIMINA</button>
      `;
      container.appendChild(div);
    });

    // Event Listeners for Dynamic Buttons (Event Delegation could be used too)
    container.querySelectorAll('.edit-btn-action').forEach(btn => {
      btn.addEventListener('click', () => editVeicolo(btn.dataset.id));
    });
    container.querySelectorAll('.delete-btn-action').forEach(btn => {
      btn.addEventListener('click', () => eliminaVeicolo(btn.dataset.id));
    });

  } catch (err) { console.error('Errore:', err); }
}

async function eliminaVeicolo(id) {
  if (!confirm('🚗 Eliminare questo veicolo?')) return;
  try {
    const res = await fetch(`${API_BASE}/veicoli/${id}`, { method: 'DELETE' });
    if (res.status === 401 || res.status === 403) logout();
    else caricaVeicoli();
  } catch (err) { console.error(err); }
}

async function editVeicolo(id) {
  try {
    const res = await fetch(`${API_BASE}/veicoli/${id}`);
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const v = await res.json();
    const form = document.getElementById('form-veicolo');
    form.dataset.editId = id;
    Object.keys(v).forEach(key => {
      const input = form.querySelector(`[name="${key}"]`);
      if (input && input.type !== 'file') input.value = v[key];
    });

    // Gestione visibilità campo "mostraVenduto" in modifica
    const labelMostra = document.getElementById('label-mostra-venduto');
    if (v.statoVendita === 'venduto') {
      labelMostra.style.display = 'block';
    } else {
      labelMostra.style.display = 'none';
    }

    document.getElementById('submit-btn-veicolo').textContent = '✏️ AGGIORNA VEICOLO';
    form.scrollIntoView({ behavior: 'smooth' });
  } catch (err) { console.error(err); }
}

document.getElementById('form-veicolo').addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const id = e.target.dataset.editId;
  const url = id ? `${API_BASE}/veicoli/${id}` : `${API_BASE}/veicoli`;
  const method = id ? 'PUT' : 'POST';
  
  const submitBtn = document.getElementById('submit-btn-veicolo');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'ELABORAZIONE...';

  try {
    const res = await fetch(url, { method, body: formData });
    if (res.status === 401 || res.status === 403) logout();
    else if (res.ok) {
      e.target.reset();
      delete e.target.dataset.editId;
      submitBtn.textContent = '🏎️ INSERISCI VEICOLO F1';
      caricaVeicoli();
      alert('Operazione completata con successo! 🏁');
    } else {
      const errorData = await res.json();
      alert('Errore: ' + (errorData.error || 'Errore sconosciuto'));
    }
  } catch (err) {
    alert('Errore di rete o del server');
  } finally {
    submitBtn.disabled = false;
    if (!e.target.dataset.editId) submitBtn.textContent = '🏎️ INSERISCI VEICOLO F1';
  }
});

// ==============================
// PERMUTE
// ==============================
async function caricaPermute() {
  try {
    const res = await fetch(`${API_BASE}/api/permuta`);
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const container = document.getElementById('lista-permute');
    container.innerHTML = '';
    const permute = await res.json();
    if (permute.length === 0) {
      container.innerHTML = '<p style="text-align:center; padding:3rem; opacity:0.5;">Nessuna richiesta di permuta trovata.</p>';
      return;
    }
    permute.forEach(p => {
      const date = new Date(p.createdAt).toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
      const card = document.createElement('div');
      card.className = 'permuta-card';
      card.innerHTML = `
        <div class="permuta-header">
          <div>
            <h3 style="color:#fff; margin-bottom:5px;">${p.marca} ${p.modello}</h3>
            <span class="text-muted" style="font-size:0.8rem;">Inviata il ${date}</span>
          </div>
          <span class="permuta-badge badge-${p.stato}">${p.stato.replace('_', ' ')}</span>
        </div>
        <div class="permuta-grid">
          <div class="info-group">
            <h4>👤 Cliente</h4>
            <div class="info-item"><b>Nome:</b> ${p.nome_cognome}</div>
            <div class="info-item"><b>Email:</b> ${p.email}</div>
            <div class="info-item"><b>Tel:</b> ${p.telefono}</div>
            <div class="info-item"><b>Città:</b> ${p.citta}</div>
          </div>
          <div class="info-group">
            <h4>🚗 Veicolo</h4>
            <div class="info-item"><b>Anno:</b> ${p.anno}</div>
            <div class="info-item"><b>Km:</b> ${p.km.toLocaleString()}</div>
          </div>
        </div>
        <div class="permuta-actions">
          <select class="status-select-action status-select" data-id="${p._id}">
            <option value="nuova" ${p.stato === 'nuova' ? 'selected' : ''}>Nuova</option>
            <option value="in_gestione" ${p.stato === 'in_gestione' ? 'selected' : ''}>In Gestione</option>
            <option value="completata" ${p.stato === 'completata' ? 'selected' : ''}>Completata</option>
            <option value="rifiutata" ${p.stato === 'rifiutata' ? 'selected' : ''}>Rifiutata</option>
          </select>
          <button class="delete-permuta-action delete-btn" data-id="${p._id}" style="margin-top:0;">🗑️ Elimina</button>
        </div>
      `;
      container.appendChild(card);
    });

    container.querySelectorAll('.status-select-action').forEach(sel => {
      sel.addEventListener('change', () => updatePermutaStatus(sel.dataset.id, sel.value));
    });
    container.querySelectorAll('.delete-permuta-action').forEach(btn => {
      btn.addEventListener('click', () => eliminaPermuta(btn.dataset.id));
    });

  } catch (err) { console.error(err); }
}

async function updatePermutaStatus(id, stato) {
  try {
    const res = await fetch(`${API_BASE}/api/permuta/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stato })
    });
    if (res.status === 401 || res.status === 403) logout();
    else caricaPermute();
  } catch (err) { console.error(err); }
}

async function eliminaPermuta(id) {
  if (!confirm('Eliminare definitivamente questa richiesta?')) return;
  try {
    const res = await fetch(`${API_BASE}/api/permuta/${id}`, { method: 'DELETE' });
    if (res.status === 401 || res.status === 403) logout();
    else caricaPermute();
  } catch (err) { console.error(err); }
}

checkSession();
